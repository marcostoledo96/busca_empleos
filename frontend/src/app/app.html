@if (!esPaginaLogin()) {
    <!-- Overlay de sidebar en mobile (cierra al hacer click) -->
    @if (sidebarAbierta()) {
        <div class="sidebar-overlay" (click)="cerrarSidebar()"></div>
    }

    <!-- Barra lateral de navegación -->
    <nav class="sidebar" [class.sidebar--abierta]="sidebarAbierta()">
        <div class="sidebar-marca">
            <span class="sidebar-titulo">BUSCA_EMPLEOS</span>
            <span class="sidebar-version">v1.0.0 // AR-2026</span>
        </div>
        <ul class="sidebar-nav">
            <li>
                <a routerLink="/" routerLinkActive="nav-activo" [routerLinkActiveOptions]="{exact: true}"
                   class="sidebar-enlace" (click)="cerrarSidebar()">
                    <span class="material-symbols-outlined">dashboard</span>
                    DASHBOARD
                </a>
            </li>
            <li>
                <a routerLink="/preferencias" routerLinkActive="nav-activo"
                   class="sidebar-enlace" (click)="cerrarSidebar()">
                    <span class="material-symbols-outlined">settings</span>
                    PREFERENCIAS
                </a>
            </li>
        </ul>
    </nav>

    <!-- Barra superior -->
    <header class="topbar">
        <!-- Botón hamburger (solo mobile) -->
        <button class="topbar-hamburger" (click)="toggleSidebar()" aria-label="Abrir menú">
            <span class="material-symbols-outlined">
                {{ sidebarAbierta() ? 'close' : 'menu' }}
            </span>
        </button>

        <div class="topbar-contenido">
            <div class="topbar-izquierda">
                <span class="topbar-seccion">{{ nombreSeccion() }}</span>
                <div class="topbar-meta">
                    <span class="topbar-meta-punto"></span>
                    <span>SISTEMA_ACTIVO</span>
                    <span class="topbar-meta-sep">|</span>
                    <span>AR-2026</span>
                </div>
            </div>
            <div class="topbar-derecha">
                <button class="topbar-btn" (click)="toggleTema()" aria-label="Cambiar tema">
                    <span class="material-symbols-outlined">
                        {{ modoOscuro() ? 'light_mode' : 'dark_mode' }}
                    </span>
                </button>
                <a routerLink="/preferencias" class="topbar-btn" aria-label="Configuración">
                    <span class="material-symbols-outlined">settings</span>
                </a>
                <button class="topbar-btn" (click)="cerrarSesion()" aria-label="Cerrar sesión">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="contenido-principal">
        <router-outlet />
    </main>

    <!-- Pie de página fijo -->
    <footer class="footer">
        <div class="footer-izquierda">
            <span class="footer-build">v1.0.0 // BUSCA_EMPLEOS</span>
            <span class="footer-sep">|</span>
            <span class="footer-estado">SISTEMA_ESTABLE</span>
        </div>
        <div class="footer-derecha">
            <span>REGIÓN: AR</span>
            <span class="footer-sep">|</span>
            <span>NODO: {{ entorno.nodo }}</span>
            <span class="footer-sep">|</span>
            <span>EPOCH: 2026-A</span>
        </div>
    </footer>
} @else {
    <!-- Página de login: sin shell, solo el router-outlet -->
    <router-outlet />
}
