<!-- Tabla de ofertas con filtros, paginación y ordenamiento -->
<div class="tabla-contenedor">
    <p-table
        [value]="ofertas()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[5, 10, 25, 50]"
        [loading]="cargando()"
        [globalFilterFields]="['titulo', 'empresa', 'ubicacion']"
        [sortField]="'fecha_extraccion'"
        [sortOrder]="-1"
        styleClass="p-datatable-striped p-datatable-sm"
        #tablaOfertas>

        <!-- Encabezado con búsqueda global -->
        <ng-template #caption>
            <div class="tabla-encabezado">
                <h3>
                    <i class="pi pi-list"></i>
                    Ofertas de empleo
                </h3>
                <div class="tabla-filtros">
                    <input
                        pInputText
                        type="text"
                        placeholder="Buscar por título, empresa o ubicación..."
                        class="filtro-busqueda"
                        (input)="tablaOfertas.filterGlobal($any($event.target).value, 'contains')" />
                </div>
            </div>
        </ng-template>

        <!-- Definición de columnas -->
        <ng-template #header>
            <tr>
                <th pSortableColumn="titulo" style="min-width: 250px">
                    Título <p-sortIcon field="titulo" />
                </th>
                <th pSortableColumn="empresa" style="min-width: 150px">
                    Empresa <p-sortIcon field="empresa" />
                </th>
                <th style="min-width: 120px">Plataforma</th>
                <th pSortableColumn="estado_evaluacion" style="min-width: 120px">
                    Estado <p-sortIcon field="estado_evaluacion" />
                </th>
                <th pSortableColumn="fecha_extraccion" style="min-width: 120px">
                    Extraída <p-sortIcon field="fecha_extraccion" />
                </th>
                <th style="width: 80px">Acción</th>
            </tr>
        </ng-template>

        <!-- Filas de datos -->
        <ng-template #body let-oferta>
            <tr>
                <td>
                    <div class="celda-titulo">
                        <span class="titulo-texto">{{ oferta.titulo }}</span>
                        @if (oferta.ubicacion) {
                            <span class="titulo-ubicacion">
                                <i class="pi pi-map-marker"></i>
                                {{ oferta.ubicacion }}
                            </span>
                        }
                    </div>
                </td>
                <td>{{ oferta.empresa || '—' }}</td>
                <td>
                    <p-tag
                        [value]="oferta.plataforma"
                        [icon]="iconoPlataforma(oferta.plataforma)"
                        severity="info" />
                </td>
                <td>
                    <p-tag
                        [value]="oferta.estado_evaluacion"
                        [severity]="severidadEstado(oferta.estado_evaluacion)" />
                </td>
                <td>
                    {{ oferta.fecha_extraccion | date:'dd/MM/yyyy' }}
                </td>
                <td>
                    <p-button
                        icon="pi pi-eye"
                        [rounded]="true"
                        [text]="true"
                        severity="info"
                        size="small"
                        (onClick)="verDetalle(oferta)" />
                </td>
            </tr>
        </ng-template>

        <!-- Mensaje cuando no hay datos -->
        <ng-template #emptymessage>
            <tr>
                <td colspan="6" class="tabla-vacia">
                    <i class="pi pi-inbox"></i>
                    <p>No hay ofertas todavía.</p>
                    <span>Usá el panel de control para ejecutar un scraping.</span>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
