<!-- Barra horizontal de 4 métricas — estilo "terminal editorial" -->
<div class="metricas">
    <div class="metrica">
        <span class="metrica-etiqueta">Total</span>
        <span class="metrica-valor">{{ estadisticas()?.total ?? '—' }}</span>
    </div>
    <div class="metrica-divisor"></div>

    <div class="metrica">
        <span class="metrica-etiqueta">Pendientes</span>
        <span class="metrica-valor">{{ estadisticas()?.pendientes ?? '—' }}</span>
    </div>
    <div class="metrica-divisor"></div>

    <div class="metrica">
        <span class="metrica-etiqueta">Aprobadas</span>
        <span class="metrica-valor metrica-valor--aprobadas">{{ estadisticas()?.aprobadas ?? '—' }}</span>
    </div>
    <div class="metrica-divisor"></div>

    <div class="metrica">
        <span class="metrica-etiqueta">Rechazadas</span>
        <span class="metrica-valor metrica-valor--rechazadas">{{ estadisticas()?.rechazadas ?? '—' }}</span>
    </div>
</div>
