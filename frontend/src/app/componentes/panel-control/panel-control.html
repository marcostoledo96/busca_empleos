<!-- Panel de acciones: Scraping + Evaluación + Automatización -->
<p-toast />

<div class="panel">
    <div class="panel-cabecera">
        <span class="panel-label">Panel de control</span>
    </div>

    <div class="panel-cuerpo">
        <!-- Scraping -->
        <div class="panel-grupo">
            <span class="grupo-label">Scraping</span>
            <div class="grupo-acciones">
                <button class="btn-accion" [class.btn-cargando]="scrapeandoLinkedin()" [disabled]="scrapeandoLinkedin()" (click)="scrapearLinkedin()">
                    <i class="pi pi-linkedin"></i>
                    {{ scrapeandoLinkedin() ? '...' : 'LinkedIn' }}
                </button>
                <button class="btn-accion" [class.btn-cargando]="scrapeandoComputrabajo()" [disabled]="scrapeandoComputrabajo()" (click)="scrapearComputrabajo()">
                    <i class="pi pi-globe"></i>
                    {{ scrapeandoComputrabajo() ? '...' : 'Computrabajo' }}
                </button>
                <button class="btn-accion" [class.btn-cargando]="scrapeandoIndeed()" [disabled]="scrapeandoIndeed()" (click)="scrapearIndeed()">
                    <i class="pi pi-search"></i>
                    {{ scrapeandoIndeed() ? '...' : 'Indeed' }}
                </button>
                <button class="btn-accion" [class.btn-cargando]="scrapeandoBumeran()" [disabled]="scrapeandoBumeran()" (click)="scrapearBumeran()">
                    <i class="pi pi-briefcase"></i>
                    {{ scrapeandoBumeran() ? '...' : 'Bumeran' }}
                </button>
            </div>
        </div>

        <div class="panel-separador"></div>

        <!-- Evaluación IA -->
        <div class="panel-grupo">
            <span class="grupo-label">Evaluación IA</span>
            <div class="grupo-acciones">
                <button class="btn-primario" [class.btn-cargando]="evaluando()" [disabled]="evaluando()" (click)="ejecutarEvaluacion()">
                    {{ evaluando() ? 'Evaluando...' : 'Evaluar pendientes' }}
                </button>
            </div>
        </div>

        <div class="panel-separador"></div>

        <!-- Automatización -->
        <div class="panel-grupo">
            <span class="grupo-label">Automatización</span>
            <div class="grupo-acciones grupo-cron">
                <p-toggleswitch
                    [ngModel]="cronActivo()"
                    (ngModelChange)="toggleCron($event)" />
                <span class="cron-texto" [class.cron-activo]="cronActivo()">
                    {{ cronActivo() ? 'Cada 48 hs' : 'Inactivo' }}
                </span>
            </div>
        </div>
    </div>
</div>
