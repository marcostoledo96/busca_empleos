<!-- Página de login completa — layout standalone, sin shell de la app -->

<!-- Header fijo: marca + toggle de tema -->
<header class="login-header">
    <div class="login-header-marca">BUSCA_EMPLEOS</div>
    <nav class="login-header-nav">
        <button
            class="login-header-tema"
            (click)="toggleTema()"
            [attr.aria-label]="esModoOscuro ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
            <span class="material-symbols-outlined">
                {{ esModoOscuro ? 'light_mode' : 'dark_mode' }}
            </span>
        </button>
    </nav>
    <div class="login-header-version">v1.0.0-alpha</div>
</header>

<!-- Canvas principal: espacio negativo extremo -->
<main class="login-main">
    <div class="login-card">

        <!-- Identidad técnica -->
        <div class="login-identidad">
            <p class="login-label">VERIFICATION_REQUIRED</p>
            <h1 class="login-titulo">Authentication</h1>
        </div>

        <!-- Separador -->
        <div class="login-divisor"></div>

        <!-- Bloque de acción -->
        <div class="login-accion">
            <p class="login-descripcion">
                Acceso restringido al propietario del sistema.<br />
                Autenticá tu identidad mediante Google.
            </p>

            <!-- Mensaje de error -->
            @if (error()) {
                <div class="login-error" role="alert">
                    <span class="material-symbols-outlined login-error-icono">error</span>
                    <span>{{ error() }}</span>
                </div>
            }

            <!-- Botón principal -->
            <button
                class="login-btn-google"
                [class.login-btn-google--cargando]="cargando()"
                [disabled]="cargando()"
                (click)="autenticarConGoogle()">
                @if (cargando()) {
                    <span class="login-spinner"></span>
                    <span>INITIALIZING_SESSION...</span>
                } @else {
                    <!-- SVG del logo de Google -->
                    <svg class="login-btn-google-icono" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    AUTHENTICATE_WITH_GOOGLE
                }
            </button>
        </div>

        <!-- Metadata técnica decorativa -->
        <div class="login-metadata">
            <div class="login-metadata-sep"></div>
            <div class="login-metadata-coords">
                <span>Lat: -34.6037</span>
                <span>Lon: -58.3816</span>
                <span>NODO: AR-LOCAL</span>
            </div>
        </div>

    </div>
</main>

<!-- Footer fijo -->
<footer class="login-footer">
    <span class="login-footer-copy">© 2026 BUSCA_EMPLEOS</span>
    <div class="login-footer-estado">
        <span class="login-footer-punto"></span>
        <span>SYSTEM: OPERATIONAL</span>
    </div>
</footer>
