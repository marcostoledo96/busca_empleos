<!-- Página principal del dashboard -->
<section class="dashboard">
    @if (mensajeEstado(); as mensaje) {
        <div class="dashboard__mensaje" [class.dashboard__mensaje--cache]="datosDesdeCache()">
            <strong>Estado de carga:</strong> {{ mensaje }}
        </div>
    }

    <!-- Tarjetas de estadísticas -->
    <app-tarjetas-estadisticas
        [estadisticas]="estadisticas()"
        [cargando]="cargando()" />

    <!-- Panel de control (scraping + evaluación) -->
    <app-panel-control
        (accionCompletada)="onAccionCompletada()" />

    <!-- Tabla de ofertas -->
    <app-tabla-ofertas
        [ofertas]="ofertas()"
        [cargando]="cargando()"
        (ofertaSeleccionada)="mostrarDetalle($event)"
        (postulacionActualizada)="onAccionCompletada()" />

    <!-- Diálogo de detalle -->
    <app-detalle-oferta
        [oferta]="ofertaSeleccionada()"
        [(visible)]="dialogoVisible"
        (postulacionActualizada)="onAccionCompletada()" />
</section>
