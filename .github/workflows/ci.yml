name: CI — Busca Empleos

on:
    push:
        branches: [master, main, 'feature/**']
    pull_request:
        branches: [master, main]

jobs:
    # ── Backend: unit tests ──
    test-unit:
        name: Backend unit tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              env:
                  NODE_ENV: test
              run: npm test

    # ── Backend: DB integration tests ──
    test-db:
        name: Backend DB tests
        runs-on: ubuntu-latest
        needs: test-unit
        defaults:
            run:
                working-directory: backend
        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: busca_empleos_test
                    POSTGRES_PASSWORD: test_password
                    POSTGRES_DB: busca_empleos_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Apply database migrations
              env:
                  DATABASE_URL: ''
                  PGHOST: localhost
                  PGPORT: 5432
                  PGUSER: busca_empleos_test
                  PGPASSWORD: test_password
                  PGDATABASE: busca_empleos_test
                  PGSSLMODE: disable
              run: |
                  npm run db:migrate:apply

            - name: Run DB integration tests
              env:
                  NODE_ENV: test
                  ALLOW_DB_TESTS: 'true'
                  DATABASE_URL: ''
                  PGHOST: localhost
                  PGPORT: '5432'
                  PGUSER: busca_empleos_test
                  PGPASSWORD: test_password
                  PGDATABASE: busca_empleos_test
                  PGSSLMODE: disable
              run: npm run test:db

    # ── Frontend: build + headless tests ──
    frontend:
        name: Frontend build & test
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build frontend
              run: npm run build

            - name: Run frontend tests (headless)
              run: npm test -- --watch=false --browsers=ChromeHeadless
